<!DOCTYPE html>
<html>
<head><title>Auth Test</title></head>
<body>
  <div id="g_id_onload"
    data-client_id="1045703206678-9jmflaotpf9q6jttqe3cr2ljs7valnfg.apps.googleusercontent.com"
    data-callback="handleCredential"
    data-auto_prompt="false">
  </div>
  <div class="g_id_signin" data-type="standard"></div>

  <pre id="output"></pre>

  <script>
    async function handleCredential(response) {
      const idToken = response.credential
      document.getElementById('output').textContent = 'idToken:\n' + idToken

      const res = await fetch('http://localhost:3000/api/v1/auth/google', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ idToken })
      })
      const data = await res.json()
      document.getElementById('output').textContent += '\n\nBackend response:\n' + JSON.stringify(data, null, 2)
    }
  </script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</body>
</html>
